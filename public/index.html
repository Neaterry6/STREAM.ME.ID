<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamMe</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
--bg:#000;--card:#121212;--text:#fff;--sec:#aaa;--orange:#ff9500;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:120px;}
header{position:fixed;top:0;left:0;right:0;background:#000;padding:12px;display:flex;gap:10px;z-index:100;}
.logo{width:40px;height:40px;border-radius:50%;background:url('https://i.ibb.co/Mx5q388P/logo.png') center/cover no-repeat;}
.search{flex:1;display:flex;background:var(--card);border-radius:999px;overflow:hidden;}
.search input{flex:1;border:none;background:transparent;color:#fff;padding:10px;}
.search button{background:var(--orange);border:none;padding:10px 14px;cursor:pointer;}
main{padding:80px 16px;}
.track{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #222;cursor:pointer;}
.track img{width:80px;height:80px;border-radius:8px;object-fit:cover;}
.track h4{font-size:0.9rem;}
.track p{font-size:0.75rem;color:var(--sec);}
#centerLoader{
position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:200;background:#000;
}
#centerLoader img{
width:120px;animation:glow 1.5s ease-in-out infinite alternate;
}
@keyframes glow{
from{opacity:0.4;transform:scale(0.95);}
to{opacity:1;transform:scale(1.05);}
}
#playerModal{
display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);
align-items:center;justify-content:center;z-index:300;
}
.modal{
background:#111;padding:20px;width:95%;max-width:500px;border-radius:14px;text-align:center;
}
.modal img{width:220px;border-radius:12px;margin:10px 0;}
.modal h2{font-size:1rem;margin:6px 0;}
.modal p{font-size:0.8rem;color:var(--sec);}
iframe,audio{width:100%;margin:12px 0;border-radius:8px;}
button.action{
background:var(--orange);border:none;padding:8px 12px;margin:4px;border-radius:6px;cursor:pointer;
}
footer{text-align:center;font-size:0.7rem;color:#666;margin-top:30px;}
</style>
</head>
<body>

<header>
<div class="logo"></div>
<div class="search">
<input id="q" placeholder="Search music or video...">
<button onclick="searchNow()"><i class="fas fa-arrow-right"></i></button>
</div>
</header>

<div id="centerLoader">
<img src="https://i.ibb.co/Mx5q388P/logo.png">
</div>

<main>
<div id="results"></div>
</main>

<div id="playerModal">
<div class="modal">
<button onclick="closePlayer()" style="float:right;background:none;color:#aaa;border:none;font-size:20px;">×</button>
<img id="cover">
<h2 id="title"></h2>
<p id="author"></p>

<div id="mediaContainer"></div>

<button class="action" onclick="downloadMedia('mp3')">Download Audio</button>
<button class="action" onclick="downloadMedia('mp4')">Download Video</button>
</div>
</div>

<footer>StreamMe 2026 — ❤️ by Akewushola AbdulBakri Temitope</footer>

<script>
const API="https://api.qasimdev.dpdns.org/api";
const KEY="qasim-dev";
let current={};
let currentQuery="trending music 2026";
let loading=false;

async function fetchResults(query,append=false){
if(loading) return;
loading=true;

if(!append){
document.getElementById("centerLoader").style.display="flex";
}

try{
const res=await fetch(`${API}/yts/searchAll?apiKey=${KEY}&query=${encodeURIComponent(query)}&video_limit=20`);
const data=await res.json();
const videos=data.data?.videos||[];

const container=document.getElementById("results");
if(!append) container.innerHTML="";

videos.forEach(v=>{
const div=document.createElement("div");
div.className="track";
div.innerHTML=`
<img src="${v.thumbnail}">
<div>
<h4>${v.title}</h4>
<p>${v.author?.name||'Unknown'} • ${v.duration?.timestamp||''}</p>
</div>`;
div.onclick=()=>openPlayer(v);
container.appendChild(div);
});
}catch(e){console.log(e);}

document.getElementById("centerLoader").style.display="none";
loading=false;
}

function searchNow(){
const val=document.getElementById("q").value.trim();
if(!val) return;
currentQuery=val;
fetchResults(val,false);
}

function openPlayer(video){
current=video;
document.getElementById("playerModal").style.display="flex";
document.getElementById("cover").src=video.thumbnail;
document.getElementById("title").textContent=video.title;
document.getElementById("author").textContent=video.author?.name||"Unknown";

const fullUrl=`https://www.youtube.com/watch?v=${video.video_id}`;

const container=document.getElementById("mediaContainer");
container.innerHTML=`
<iframe src="https://www.youtube.com/embed/${video.video_id}?autoplay=1" frameborder="0" allowfullscreen></iframe>
`;

current.fullUrl=fullUrl;
}

function closePlayer(){
document.getElementById("playerModal").style.display="none";
document.getElementById("mediaContainer").innerHTML="";
}

function downloadMedia(format){
if(!current.fullUrl) return;
const url=`${API}/loaderto/download?apiKey=${KEY}&url=${encodeURIComponent(current.fullUrl)}&format=${format}`;
const a=document.createElement("a");
a.href=url;
a.target="_blank";
document.body.appendChild(a);
a.click();
a.remove();
}

window.addEventListener("scroll",()=>{
if((window.innerHeight+window.scrollY)>=document.body.offsetHeight-300){
fetchResults(currentQuery,true);
}
});

window.onload=()=>{
fetchResults(currentQuery,false);
};
</script>

</body>
</html>
