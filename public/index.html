<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamMe</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--bg:#000;
--card:#121212;
--text:#fff;
--sec:#aaa;
--orange:#ff9500;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:system-ui;
background:var(--bg);
color:var(--text);
min-height:100vh;
padding-bottom:100px;
}

/* HEADER */
header{
position:fixed;
top:0;left:0;right:0;
background:#000;
padding:12px;
display:flex;
gap:10px;
z-index:100;
border-bottom:1px solid #111;
}
.logo{
width:45px;height:45px;border-radius:50%;
background:url('https://i.ibb.co/Mx5q388P/StreamMe.png') center/cover no-repeat;
flex-shrink:0;
}
.search{
flex:1;
display:flex;
background:var(--card);
border-radius:999px;
overflow:hidden;
}
.search input{
flex:1;border:none;background:transparent;color:#fff;padding:10px;font-size:0.95rem;
}
.search button{
background:var(--orange);border:none;padding:10px 14px;cursor:pointer;color:#000;
}

/* LOADER */
#centerLoader{
position:fixed;inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:#000;
z-index:300;
}
#centerLoader img{
width:120px;
animation:glow 1.5s infinite alternate;
}
@keyframes glow{
from{opacity:0.5;transform:scale(0.95);}
to{opacity:1;transform:scale(1.05);}
}

/* MAIN */
main{padding:90px 16px 120px;}
.section{display:none;}
.section.active{display:block;}
.section h2{color:var(--orange);margin:10px 0;}

.track{
display:flex;gap:10px;
padding:10px 0;
border-bottom:1px solid #222;
cursor:pointer;
}
.track img{
width:80px;height:80px;border-radius:8px;object-fit:cover;
}
.track h4{font-size:0.9rem;}
.track p{font-size:0.75rem;color:var(--sec);}

/* NAV */
nav{
position:fixed;bottom:0;left:0;right:0;
background:#000;
display:flex;justify-content:space-around;
padding:10px 0;border-top:1px solid #111;
}
nav button{
background:none;border:none;color:#aaa;
font-size:18px;
display:flex;flex-direction:column;
align-items:center;gap:4px;
cursor:pointer;
}
nav button.active{color:var(--orange);}

/* MODAL */
#playerModal{
display:none;
position:fixed;inset:0;
background:rgba(0,0,0,0.95);
align-items:center;
justify-content:center;
z-index:400;
}
.modal{
background:#111;
padding:20px;
width:95%;max-width:500px;
border-radius:14px;
text-align:center;
animation:fadeUp 0.3s ease;
}
@keyframes fadeUp{
from{transform:translateY(30px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}
.modal img{
width:200px;border-radius:12px;margin:10px 0;
}
iframe,audio{
width:100%;margin:12px 0;border-radius:8px;
}
button.action{
background:var(--orange);
border:none;padding:8px 12px;
margin:4px;border-radius:6px;cursor:pointer;
}

/* MINI PLAYER */
#miniPlayer{
position:fixed;
bottom:70px;
left:0;right:0;
background:#111;
padding:8px 12px;
display:none;
align-items:center;
gap:10px;
border-top:1px solid #222;
z-index:350;
}
#miniPlayer span{
flex:1;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
font-size:0.85rem;
}

footer{
text-align:center;
font-size:0.7rem;
color:#666;
margin-top:20px;
}

/* Responsive */
@media(max-width:600px){
.track img{width:65px;height:65px;}
.modal img{width:150px;}
}
</style>
</head>
<body>

<header>
<div class="logo"></div>
<div class="search">
<input id="q" placeholder="Search music...">
<button onclick="searchNow(true)"><i class="fas fa-arrow-right"></i></button>
</div>
</header>

<div id="centerLoader">
<img src="https://i.ibb.co/Mx5q388P/StreamMe.png">
<p style="margin-top:10px;">Loading StreamMe...</p>
</div>

<main>
<div id="home" class="section active">
<h2>Trending</h2>
<div id="trendingContainer"></div>

<h2>Recently Played</h2>
<div id="recentContainer"></div>
</div>

<div id="favorites" class="section"></div>
<div id="downloads" class="section"></div>
<div id="playlists" class="section"></div>
</main>

<nav>
<button class="active" onclick="switchSection('home',this)">
<i class="fas fa-home"></i><span>Home</span>
</button>
<button onclick="switchSection('favorites',this)">
<i class="fas fa-heart"></i><span>Favorites</span>
</button>
<button onclick="switchSection('downloads',this)">
<i class="fas fa-download"></i><span>Downloads</span>
</button>
<button onclick="switchSection('playlists',this)">
<i class="fas fa-list"></i><span>Playlists</span>
</button>
<button onclick="goAbout()">
<i class="fas fa-info-circle"></i><span>About</span>
</button>
</nav>

<div id="playerModal">
<div class="modal">
<button onclick="closePlayer()" style="float:right;background:none;color:#aaa;border:none;font-size:20px;">×</button>
<img id="cover">
<h3 id="title"></h3>
<p id="author"></p>
<div id="mediaContainer"></div>

<button class="action" onclick="playVideo()">🎥 Play Video</button>
<button class="action" onclick="playAudio()">🎵 Play Audio</button>
<button class="action" onclick="downloadMedia('mp3')">📥 Download Audio</button>
<button class="action" onclick="downloadMedia('mp4')">📥 Download Video</button>
<button class="action" onclick="addFavorite()">❤️ Favorite</button>
<button class="action" onclick="addToPlaylist()">➕ Playlist</button>
</div>
</div>

<div id="miniPlayer">
<span id="miniTitle"></span>
<audio id="miniAudio" controls></audio>
</div>

<footer>StreamMe 2026 — ❤️ by Akewushola AbdulBakri Temitope</footer>

<script>
const API="https://api.qasimdev.dpdns.org/api";
const KEY="qasim-dev";

let current={}, page=1, currentQuery="", loading=false;

// Loader 5 seconds
window.onload=()=>{
setTimeout(()=>{
document.getElementById("centerLoader").style.display="none";
loadTrending();
renderRecent();
},5000);
};

function goAbout(){
window.location.href="./about.html";
}

function switchSection(id,btn){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
renderSaved();
}

async function loadTrending(){
const res=await fetch(`${API}/yts/searchAll?apiKey=${KEY}&query=trending&video_limit=15`);
const data=await res.json();
renderVideos(data.data?.videos||[],document.getElementById("trendingContainer"));
}

async function searchNow(reset){
const val=document.getElementById("q").value.trim();
if(!val) return;
if(reset){
currentQuery=val;
page=1;
document.getElementById("trendingContainer").innerHTML="";
}
if(loading) return;
loading=true;

const res=await fetch(`${API}/yts/searchAll?apiKey=${KEY}&query=${encodeURIComponent(currentQuery)}&video_limit=15`);
const data=await res.json();
renderVideos(data.data?.videos||[],document.getElementById("trendingContainer"));
page++;
loading=false;
}

function renderVideos(videos,container){
videos.forEach(v=>{
const div=document.createElement("div");
div.className="track";
div.innerHTML=`<img src="${v.thumbnail}">
<div><h4>${v.title}</h4><p>${v.author?.name||''}</p></div>`;
div.onclick=()=>openPlayer(v);
container.appendChild(div);
});
}

window.addEventListener("scroll",()=>{
if((window.innerHeight+window.scrollY)>=document.body.offsetHeight-200){
if(currentQuery) searchNow(false);
}
});

function openPlayer(v){
current=v;
current.fullUrl=`https://www.youtube.com/watch?v=${v.video_id}`;
document.getElementById("playerModal").style.display="flex";
document.getElementById("cover").src=v.thumbnail;
document.getElementById("title").textContent=v.title;
document.getElementById("author").textContent=v.author?.name||'';
document.getElementById("mediaContainer").innerHTML="";
addRecent(v);
}

function closePlayer(){document.getElementById("playerModal").style.display="none";}

function playVideo(){
document.getElementById("mediaContainer").innerHTML=
`<iframe src="https://www.youtube.com/embed/${current.video_id}?autoplay=1" allowfullscreen></iframe>`;
}

async function playAudio(){
const res=await fetch(`${API}/loaderto/download?apiKey=${KEY}&url=${encodeURIComponent(current.fullUrl)}&format=mp3`);
const data=await res.json();
if(data.success && data.data?.downloadUrl){
document.getElementById("mediaContainer").innerHTML=
`<audio controls autoplay src="${data.data.downloadUrl}"></audio>`;
document.getElementById("miniPlayer").style.display="flex";
document.getElementById("miniTitle").textContent=current.title;
document.getElementById("miniAudio").src=data.data.downloadUrl;
}
}

async function downloadMedia(format){
const res=await fetch(`${API}/loaderto/download?apiKey=${KEY}&url=${encodeURIComponent(current.fullUrl)}&format=${format}`);
const data=await res.json();
if(data.success && data.data?.downloadUrl){
window.open(data.data.downloadUrl,"_blank");
}
}

function addFavorite(){
let fav=JSON.parse(localStorage.getItem("fav")||"[]");
if(!fav.find(v=>v.video_id===current.video_id)){
fav.push(current);
localStorage.setItem("fav",JSON.stringify(fav));
}
}

function addToPlaylist(){
let list=JSON.parse(localStorage.getItem("playlist")||"[]");
if(!list.find(v=>v.video_id===current.video_id)){
list.push(current);
localStorage.setItem("playlist",JSON.stringify(list));
}
}

function addRecent(v){
let rec=JSON.parse(localStorage.getItem("recent")||"[]");
rec=rec.filter(x=>x.video_id!==v.video_id);
rec.unshift(v);
localStorage.setItem("recent",JSON.stringify(rec.slice(0,10)));
renderRecent();
}

function renderRecent(){
let container=document.getElementById("recentContainer");
container.innerHTML="";
let rec=JSON.parse(localStorage.getItem("recent")||"[]");
rec.forEach(v=>{
const div=document.createElement("div");
div.className="track";
div.innerHTML=`<img src="${v.thumbnail}">
<div><h4>${v.title}</h4><p>${v.author?.name||''}</p></div>`;
div.onclick=()=>openPlayer(v);
container.appendChild(div);
});
}

function renderSaved(){
["fav","playlist"].forEach(type=>{
let data=JSON.parse(localStorage.getItem(type)||"[]");
let id=type==="fav"?"favorites":"playlists";
let container=document.getElementById(id);
if(container){
container.innerHTML="";
data.forEach(v=>{
const div=document.createElement("div");
div.className="track";
div.innerHTML=`<img src="${v.thumbnail}">
<div><h4>${v.title}</h4><p>${v.author?.name||''}</p></div>`;
div.onclick=()=>openPlayer(v);
container.appendChild(div);
});
}
});
}
</script>

</body>
</html>
