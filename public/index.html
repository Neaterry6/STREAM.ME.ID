<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamMe Music & Video 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #ff9800;
    --dark: #111;
    --light: #fff;
    --card-bg: rgba(34,34,34,0.85);
  }
  body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: var(--dark);
    color: var(--light);
    min-height: 100vh;
    background-size: cover;
    background-position: center;
    transition: background 0.5s ease;
  }
  header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: var(--primary);
    padding:10px 20px;
    position:sticky;
    top:0;
    z-index:10;
  }
  .logo-text img {
    height:40px;
    border-radius:50%;
  }
  .search-bar {
    flex:1;
    display:flex;
    margin:0 20px;
  }
  .search-bar input {
    flex:1;
    padding:8px;
    border:none;
    border-radius:4px;
  }
  .search-bar button {
    margin-left:10px;
    padding:8px 15px;
    background: var(--dark);
    color: var(--light);
    border:none;
    border-radius:4px;
    cursor:pointer;
  }
  #themeToggle {
    background: var(--dark);
    color: var(--light);
    border:none;
    padding:8px 15px;
    border-radius:4px;
    cursor:pointer;
  }
  main {
    padding:20px;
  }
  .history-panel {
    margin-bottom:20px;
    background: var(--card-bg);
    padding:10px;
    border-radius:8px;
  }
  .grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
  }
  .card {
    background: var(--card-bg);
    padding:15px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 4px 8px rgba(0,0,0,0.3);
    transition: transform 0.2s ease;
  }
  .card:hover {
    transform: translateY(-5px);
  }
  .card img {
    width:100%;
    border-radius:8px;
    margin-bottom:10px;
  }
  .card h3 {
    margin:5px 0;
    font-size:16px;
  }
  .card p {
    margin:0;
    font-size:14px;
    color:#ccc;
  }
  .card button {
    margin-top:10px;
    padding:8px 12px;
    background: var(--primary);
    border:none;
    border-radius:4px;
    cursor:pointer;
    color:#000;
    font-weight:600;
  }
  .modal {
    display:none;
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.8);
    align-items:center;
    justify-content:center;
    z-index:10000;
  }
  .modal-content {
    background:#222;
    padding:20px;
    border-radius:12px;
    width:90%;
    max-width:500px;
    text-align:center;
  }
  .modal-content img {
    width:250px;
    border-radius:8px;
    margin:15px 0;
  }
  .close {
    float:right;
    font-size:24px;
    cursor:pointer;
  }
  footer {
    background:#222;
    text-align:center;
    padding:15px;
    margin-top:20px;
  }
  footer a {
    color: var(--primary);
    margin-left:10px;
  }
  /* Responsive tweaks */
  @media(max-width:600px){
    header { flex-direction:column; }
    .search-bar { margin:10px 0; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-text"><img id="logoImg" src="" alt="Logo"></div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search music or videos...">
    <button id="searchBtn">Search</button>
  </div>
  <button id="themeToggle">Toggle Theme</button>
</header>

<!-- DASHBOARD -->
<main>
  <div id="searchHistory" class="history-panel"></div>
  <div class="grid" id="resultsGrid"></div>
</main>

<!-- PLAYER MODAL -->
<div id="playerModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('playerModal')">&times;</span>
    <h2 id="mediaTitle">Title</h2>
    <p id="mediaArtist">Artist / Channel</p>
    <img id="coverImage" src="https://via.placeholder.com/250" alt="Cover Art">
    <audio id="audioPlayer" controls style="display:none;"></audio>
    <iframe id="videoPlayer" width="100%" height="315" style="display:none;" frameborder="0" allowfullscreen></iframe>
    <a id="downloadBtn" href="#" target="_blank" style="display:inline-block;margin-top:10px;padding:8px 12px;background:var(--primary);color:#000;border-radius:4px;font-weight:600;text-decoration:none;">Download</a>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>StreamMe Music & Video 2026 — Created with ❤️ by Akewushola AbdulBakri Temitope</p>
  <a href="about.html">About</a>
</footer>

<script>
  // Fetch Waifu API images for background and logo
  async function setBackgroundAndLogo(){
    try {
      const res = await fetch('https://api.waifu.pics/sfw/waifu');
      const data = await res.json();
      document.body.style.backgroundImage = `url(${data.url})`;
      document.getElementById('logoImg').src = data.url;
    } catch(e){ console.error(e); }
  }
  setBackgroundAndLogo();

  let currentSource = 'youtube';

  document.getElementById('searchBtn').addEventListener('click', search);
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);

  async function search() {
    const q = document.getElementById('searchInput').value;
    let url = '';
    if (currentSource === 'youtube') {
      url = `/api/yts/searchAll?q=${encodeURIComponent(q)}`;
    } else if (currentSource === 'spotify') {
      url = `/api/spotify/search?q=${encodeURIComponent(q)}`;
    } else {
      url = `/api/musicbrainz/search?q=${encodeURIComponent(q)}`;
    }
    const res = await fetch(url);
    const data = await res.json();
    renderResults(data);
  }

  function renderResults(data) {
    const grid = document.getElementById('resultsGrid');
    grid.innerHTML = '';
    const items = data.items || data.results || data.tracks || [];
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${item.thumbnail || 'https://via.placeholder.com/250'}" alt="cover">
        <h3>${item.title || item.name || 'Untitled'}</h3>
        <p>${item.artist || item.channel || ''}</p>
        <button onclick='openPlayer(${JSON.stringify(item)})'>Play</button>
      `;
      grid.appendChild(card);
    });
  }

  function openPlayer(item) {
    document.getElementById('playerModal').style.display='flex';
    document.getElementById('mediaTitle').innerText = item.title || item.name || 'Untitled';
    document.getElementById('mediaArtist').innerText = item.artist || item.channel || '';
    document.getElementById('coverImage').src = item.thumbnail || 'https://via.placeholder.com/250';

    const audio = document.getElementById('audioPlayer');
    const video = document.getElementById('videoPlayer');
    audio.style.display='none';
    video.style.display='none';

    if (item.url && (item.url.endsWith('.mp3') || item.url.includes('audio'))) {
      audio.src = item.url;
      audio.style.display='block';
    } else if (item.videoUrl) {
      video.src = item.videoUrl;
      video.style.display='block';
    }

    const downloadBtn = document.getElementById('downloadBtn');
    if (item.downloadUrl) {
      downloadBtn.href = item.downloadUrl;
      downloadBtn.style.display = 'inline-block';
    } else {
      downloadBtn.href = '#';
      downloadBtn.style.display = 'none';
    }
  }

  function closeModal(id) {
    document.getElementById(id).style.display = 'none';
    // Stop playback when closing
    document.getElementById('audioPlayer').pause();
    document.getElementById('videoPlayer').src = '';
  }

  async function toggleTheme() {
    document.body.classList.toggle('light');
    if (document.body.classList.contains('light')) {
      document.body.style.backgroundColor = '#fff';
      document.body.style.color = '#000';
    } else {
      document.body.style.backgroundColor = '#111';
      document.body.style.color = '#fff';
    }
  }
</script>
</body>
</html>
