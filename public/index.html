<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamMe Music & Video 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
  <div class="logo-animation">
    <img src="https://i.ibb.co/YOUR-ID-HERE/Mx5q388P.jpg" width="80" height="80" alt="StreamMe Logo">
    <p>StreamMe Music & Video 2026</p>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo-text">
    <img id="logoImg" src="https://i.ibb.co/YOUR-ID-HERE/Mx5q388P.jpg" alt="StreamMe Logo">
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search music or videos...">
    <button id="searchBtn">Search</button>
  </div>
  <div class="source-buttons">
    <button onclick="setSource('youtube')">YouTube</button>
    <button onclick="setSource('spotify')">Spotify</button>
    <button onclick="setSource('musicbrainz')">MusicBrainz</button>
  </div>
  <button id="themeToggle">Toggle Theme</button>
</header>

<!-- MAIN -->
<main>
  <section id="trending" class="grid"></section>

  <div id="searchHistory" class="history-panel">
    <h3>Search History & Logs</h3>
    <ul id="historyList"></ul>
  </div>

  <div class="grid" id="resultsGrid"></div>
</main>

<!-- PLAYER MODAL -->
<div id="playerModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('playerModal')">×</span>
    <h2 id="mediaTitle">Title</h2>
    <p id="mediaArtist">Artist / Channel</p>
    <img id="coverImage" src="https://via.placeholder.com/250" alt="Cover Art">
    <audio id="audioPlayer" controls style="display:none;"></audio>
    <iframe id="videoPlayer" width="100%" height="315" style="display:none;" frameborder="0" allowfullscreen></iframe>
    <a id="downloadBtn" href="#" target="_blank" style="display:none;">Download</a>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>StreamMe Music & Video 2026 — Created with ❤️ by Akewushola AbdulBakri Temitope</p>
  <a href="about.html">About</a>
</footer>

<script src="/script.js"></script>
</body>
</html>
