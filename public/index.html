
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamMe Music & Video 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
  <img src="logo.png" alt="StreamMe Logo" class="logo">
  <p>StreamMe Music & Video 2026</p>
</div>

<!-- HEADER -->
<header>
  <div class="logo-text">🎵 StreamMe</div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search music or videos...">
    <button id="searchBtn">Search</button>
  </div>
  <button id="themeToggle">Toggle Theme</button>
</header>

<!-- DASHBOARD -->
<main>
  <div id="searchHistory" class="history-panel"></div>
  <div class="grid" id="resultsGrid"></div>
</main>

<!-- PLAYER MODAL -->
<div id="playerModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('playerModal')">&times;</span>
    <h2 id="mediaTitle">Title</h2>
    <p id="mediaArtist">Artist / Channel</p>
    <img id="coverImage" src="https://via.placeholder.com/250" alt="Cover Art">
    <audio id="audioPlayer" controls style="display:none;"></audio>
    <iframe id="videoPlayer" width="100%" height="315" style="display:none;" frameborder="0" allowfullscreen></iframe>
    <a id="downloadBtn" href="#" target="_blank">Download</a>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>StreamMe Music & Video 2026 — Created with ❤️ by Akewushola AbdulBakri Temitope</p>
  <a href="about.html">About</a>
</footer>

<script src="script.js"></script>
</body>
</html>
